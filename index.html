<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#ececea" />
  <title>F3K Logbook</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <img class="mark" src="icon.svg" alt="" />
        <h1>F3K LOGBOOK</h1>
      </div>
      <button id="themeBtn" class="iconBtn" aria-label="theme">◐</button>
    </header>

    <section class="panel datePanel">
      <button id="dateToggle" class="panelHead" type="button">
        <span><b>DATE</b><em id="dateLabel">ALL TIME</em></span>
        <i id="dateChevron">▾</i>
      </button>
      <div id="dateBody" class="dateBody hidden">
        <div class="dateToolbar">
          <button id="allTimeBtn" class="chip active">ALL TIME</button>
          <button id="clearDatesBtn" class="chip">CLEAR</button>
          <span id="yearLabel" class="yearLabel">2023</span>
        </div>
        <div id="monthGrid" class="monthGrid"></div>
        <div id="calendarWrap" class="calendarWrap hidden">
          <div id="monthLabel" class="monthLabel">MAY 2023</div>
          <div class="weekdays"><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span></div>
          <div id="calendar" class="calendar"></div>
        </div>
      </div>
    </section>

    <section class="panel summaryPanel">
      <div class="sectionKicker">SUMMARY</div>
      <div class="infoLine" id="infoLine">
        <div><span>FLIGHTS</span><b id="mFlights">0</b></div>
        <div><span>TOTAL TIME</span><b id="mTime">00:00:00</b></div>
      </div>
      <div class="recordGrid" id="recordGrid">
        <button class="recordCard" data-focus="maxAlt"><span>MAX ALT</span><b id="mMaxAlt">0 m</b></button>
        <button class="recordCard" data-focus="launch"><span>MAX LAUNCH</span><b id="mLaunch">0 m</b></button>
        <button class="recordCard" data-focus="gain"><span>MAX GAIN</span><b id="mGain">0 m</b></button>
        <button class="recordCard" data-focus="longest"><span>LONGEST</span><b id="mLongest">00:00</b></button>
      </div>
    </section>

    <section class="panel detailsPanel">
      <div class="detailsHead">
        <div class="sectionKicker">FLIGHT DATA</div>
        <div class="tabs">
          <button id="chartsTab" class="tab active">CHART</button>
          <button id="tableTab" class="tab">TABLE</button>
        </div>
      </div>

      <section id="chartPanel" class="chartPanel">
        <div class="chartTop">
          <button id="backBtn" class="chip hidden">OVERLAY</button>
          <span id="chartLabel">ALL FLIGHTS OVERLAY</span>
          <button id="fitBtn" class="fitBtn">FIT</button>
        </div>
        <div id="chartFrame" class="chartFrame">
          <canvas id="chartCanvas"></canvas>
          <div id="loader" class="loader hidden"><i></i></div>
        </div>
      </section>

      <section id="tablePanel" class="tablePanel hidden">
        <table>
          <thead><tr><th>Date</th><th>Time</th><th class="sortable" data-k="launchAlt">Lnh</th><th class="sortable" data-k="maxAlt">Max</th><th class="sortable" data-k="gain">Gain</th><th class="sortable" data-k="duration">Dur</th></tr></thead>
          <tbody id="logRows"></tbody>
        </table>
      </section>
    </section>

    <footer class="footer">F3K LOGBOOK by SRK.FPV</footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
