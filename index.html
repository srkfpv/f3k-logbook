<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#DB2777" />
  <meta name="apple-mobile-web-app-title" content="F3K LOGBOOK" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>F3K Logbook</title>
  <link rel="manifest" href="manifest.json?v=f3k-v37-force-20260526" />
  <link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css?v=f3k-v37-force-20260526" />
</head>
<body>

    <div class="bootTrack">
      <div id="bootBar" class="bootBar"></div>
      <div id="bootPlane" class="bootPlane">✈</div>
    </div>
  </div>
</div>

    <div class="bootTrack">
      <div id="bootBar" class="bootBar"></div>
      <div id="bootPlane" class="bootPlane">✈</div>
    </div>
  </div>
</div>
  </div>
</div>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <img class="mark" src="icon-192.png" alt="" />
        <h1>F3K LOGBOOK</h1>
      </div>
      <button id="themeBtn" class="iconBtn" aria-label="theme">◐</button>
    </header>

    <section class="panel datePanel">
      <div class="sectionKicker">SELECT</div>
      <button id="dateToggle" class="panelHead" type="button">
        <span><em id="dateLabel">LAST SESSION</em></span>
        <i id="dateChevron">▾</i>
      </button>
      <div id="dateBody" class="dateBody hidden">
        <div class="dateToolbar presetToolbar">
          <button id="lastBtn" class="tab periodTab active">LAST</button>
          <button id="last10Btn" class="tab periodTab">LAST 10</button>
          <button id="allTimeBtn" class="tab periodTab">ALL</button>
          <button id="byDateBtn" class="tab periodTab">BY DATE</button>
        </div>
        <div id="calendarWrap" class="calendarWrap hidden">
          <div class="monthNav">
            <button id="prevMonthBtn" class="monthArrow" type="button" aria-label="previous month">‹</button>
            <div id="monthLabel" class="monthLabel">MAY 2026</div>
            <button id="nextMonthBtn" class="monthArrow" type="button" aria-label="next month">›</button>
          </div>
          <div class="weekdays"><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span></div>
          <div id="calendar" class="calendar"></div>
        </div>
      </div>
    </section>

    <section class="panel summaryPanel">
      <div class="sectionKicker">SUMMARY</div>
      <div class="infoLine" id="infoLine">
        <div><span>FLIGHTS</span><b id="mFlights">0</b></div>
        <div><span>TOTAL AIR TIME</span><b id="mTime">00:00:00</b></div>
      </div>
      <div class="recordGrid" id="recordGrid">
        <button class="recordCard" data-focus="maxAlt"><span>MAX ALT</span><b id="mMaxAlt">0 m</b></button>
        <button class="recordCard" data-focus="launch"><span>MAX LAUNCH</span><b id="mLaunch">0 m</b></button>
        <button class="recordCard" data-focus="gain"><span>MAX GAIN</span><b id="mGain">0 m</b></button>
        <button class="recordCard" data-focus="longest"><span>LONGEST</span><b id="mLongest">00:00</b></button>
      </div>
    </section>

    <section class="panel detailsPanel">
      <div class="detailsHead">
        <div class="sectionKicker">FLIGHTS DETAILS</div>
        <div class="tabs dataTabs">
          <button id="sessionTab" class="tab active">OVERLAY</button>
          <button id="flightTab" class="tab">FLIGHT</button>
          <button id="tableTab" class="tab">TABLE</button>
        </div>
      </div>

      <section id="chartPanel" class="chartPanel">
        <div class="chartTop">
          <button id="prevFlightBtn" class="flightNav hidden" type="button" aria-label="previous flight">‹</button>
          <div class="chartTitle">
            <span id="chartLabel">ALL FLIGHTS</span>
            <small id="chartSub">SESSION OVERLAY</small>
          </div>
          <button id="nextFlightBtn" class="flightNav hidden" type="button" aria-label="next flight">›</button>
        </div>
        <div id="chartFrame" class="chartFrame">
          <button id="chartFitBtn" class="chartFitBtn" type="button" aria-label="fit chart to view">↘↗</button>
          <canvas id="chartCanvas"></canvas>
          <div id="loader" class="loader hidden"><i></i></div>
        </div>
      </section>

      <section id="tablePanel" class="tablePanel hidden">
        <table>
          <thead><tr><th class="sortable" data-k="datetime">Date</th><th class="sortable" data-k="time">Time</th><th class="sortable" data-k="launchAlt">Lnh</th><th class="sortable" data-k="maxAlt">Max</th><th class="sortable" data-k="gain">Gain</th><th class="sortable" data-k="duration">Dur</th></tr></thead>
          <tbody id="logRows"></tbody>
        </table>
      </section>
    </section>

    <footer class="footer"><span>F3K LOGBOOK by SRK.FPV</span><em>ver. 45.0</em></footer>
  </main>
  <script src="app.js?v=f3k-v37-force-20260526"></script>
</body>
</html>
