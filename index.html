<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b7bbf" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>F3K Logbook</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="brand-row">
        <div class="sig" aria-hidden="true">
          <svg viewBox="0 0 48 48"><path d="M7 31 C14 18, 24 8, 41 7 C32 13, 25 23, 21 39 C18 30, 13 29, 7 31Z"/><path d="M17 28 L39 12"/></svg>
        </div>
        <div>
          <h1>F3K Logbook</h1>
          <p>by SRK.FPV</p>
        </div>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">☀︎</button>
      </div>
    </header>

    <section class="session-bar">
      <button id="allTime" class="date-chip active">All time <span id="allCount">0</span></button>
      <div id="dateChips" class="date-chips"></div>
    </section>

    <section class="chart-card">
      <div class="chart-topline">
        <div id="scopeLabel" class="scope">All time</div>
        <div class="zoom-controls">
          <button id="zoomOut">−</button>
          <button id="zoomReset">fit</button>
          <button id="zoomIn">+</button>
        </div>
      </div>
      <div id="chartScroller" class="chart-scroller">
        <svg id="chart" class="chart" role="img" aria-label="Altitude overlay chart"></svg>
      </div>
      <div id="tooltip" class="tooltip hidden"></div>
    </section>

    <section class="metrics-grid">
      <button class="metric total" id="cardFlights"><span>Flights</span><strong id="mFlights">0</strong></button>
      <button class="metric total" id="cardTime"><span>Total time</span><strong id="mTime">00:00:00</strong></button>
      <button class="metric" data-focus="maxAlt"><span>Max alt</span><strong id="mMaxAlt">0 m</strong><small id="mMaxAltSub">tap to isolate</small></button>
      <button class="metric" data-focus="launchAlt"><span>Launch</span><strong id="mLaunch">0 m</strong><small id="mLaunchSub">tap to isolate</small></button>
      <button class="metric" data-focus="gain"><span>Gain</span><strong id="mGain">0 m</strong><small id="mGainSub">tap to isolate</small></button>
      <button class="metric" data-focus="duration"><span>Longest</span><strong id="mLongest">00:00</strong><small id="mLongestSub">tap to isolate</small></button>
    </section>

    <footer class="status-row">
      <span id="status">Loading repo logs…</span>
      <span id="selectedInfo">Overlay</span>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
