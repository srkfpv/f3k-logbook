<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <title>F3K Logbook</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brandmark" aria-hidden="true">
        <svg viewBox="0 0 32 32"><path d="M4 22h24v3H4z"/><path d="M7 19 16 6l9 13h-5l-4-6-4 6z"/><path d="M4 15h6v2H4zm18 0h6v2h-6z"/></svg>
      </div>
      <div class="titleBlock">
        <h1>F3K Logbook</h1>
        <span>by SRK.FPV</span>
      </div>
      <button id="themeBtn" class="iconBtn" type="button" aria-label="toggle theme">DAY</button>
    </header>

    <section class="statusLine">
      <div><b id="sessionLabel">All time</b><span id="sessionMeta">Loading logs…</span></div>
      <button id="dateToggle" class="flatBtn" type="button">Dates</button>
    </section>

    <section id="datePanel" class="datePanel hidden" aria-label="date selector"></section>

    <section class="statsGrid">
      <button class="statCard" data-action="all"><span>Flights</span><b id="mFlights">--</b></button>
      <button class="statCard" data-action="time"><span>Total</span><b id="mTime">--:--</b></button>
      <button class="statCard" data-action="maxAlt"><span>Max alt</span><b id="mMaxAlt">--</b></button>
      <button class="statCard" data-action="launch"><span>Launch</span><b id="mLaunch">--</b></button>
      <button class="statCard" data-action="gain"><span>Gain</span><b id="mGain">--</b></button>
      <button class="statCard" data-action="longest"><span>Longest</span><b id="mLongest">--:--</b></button>
    </section>

    <section class="chartShell">
      <div class="chartTop">
        <div id="chartModeLabel">Overlay</div>
        <div class="zoomControls">
          <button id="zoomOut" type="button">−</button>
          <button id="fitView" type="button">fit</button>
          <button id="zoomIn" type="button">+</button>
        </div>
      </div>
      <svg id="chart" viewBox="0 0 390 260" preserveAspectRatio="none" role="img" aria-label="flight chart"></svg>
      <div id="tooltip" class="tooltip hidden"></div>
    </section>

    <nav class="tabs" aria-label="view selector">
      <button id="tabChart" class="active" type="button">Charts</button>
      <button id="tabTable" type="button">Log table</button>
    </nav>

    <section id="chartTools" class="panel toolsPanel">
      <button id="overlayBtn" type="button">All flights</button>
      <button id="singleBtn" type="button">Selected flight</button>
      <button id="clearSelection" type="button">Clear pick</button>
    </section>

    <section id="tablePanel" class="panel tablePanel hidden">
      <div class="tableHead"><span>Date</span><span>Time</span><span>Lnh</span><span>Max</span><span>Gain</span><span>Dur</span></div>
      <div id="flightTable" class="flightTable"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
