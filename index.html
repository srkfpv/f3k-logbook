<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="F3K DLG" />
  <title>F3K DLG Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div>
      <h1>F3K DLG</h1>
      <p>Session dashboard · altitude, launch, gain, duration</p>
    </div>
    <label class="importBtn">
      Import logs
      <input id="fileInput" type="file" multiple accept=".csv,text/csv" />
    </label>
  </header>

  <main>
    <section class="panel statsGrid" id="statsGrid">
      <div><span>Flights</span><b id="sFlights">0</b></div>
      <div><span>Flight time</span><b id="sTime">00:00:00</b></div>
      <div><span>Max alt</span><b id="sMaxAlt">0 m</b></div>
      <div><span>Max launch</span><b id="sLaunch">0 m</b></div>
      <div><span>Max gain</span><b id="sGain">0 m</b></div>
      <div><span>Longest</span><b id="sLongest">00:00</b></div>
    </section>

    <section class="panel controls">
      <div class="controlRow">
        <button id="showAll">All</button>
        <button id="showTopAlt">Top alt</button>
        <button id="showLongest">Longest</button>
        <button id="resetView">Reset view</button>
        <button id="exportSvg">Export SVG</button>
      </div>
      <div class="controlRow">
        <label>Mode
          <select id="mode">
            <option value="overlay">Altitude overlay</option>
            <option value="launch">Launch trend</option>
            <option value="duration">Duration trend</option>
            <option value="gain">Gain trend</option>
            <option value="scatter">Duration vs launch</option>
            <option value="vario">Vario overlay</option>
          </select>
        </label>
        <label>Min duration <input id="minDuration" type="range" min="0" max="300" value="0" /></label>
        <span id="minDurationLabel">0 s</span>
        <label>Line opacity <input id="opacity" type="range" min="15" max="100" value="56" /></label>
        <label>Line width <input id="lineWidth" type="range" min="1" max="4" value="2" /></label>
      </div>
      <div class="hint">iPhone: tap line/point for tooltip. Desktop: wheel zoom, drag pan, Shift+drag box zoom.</div>
    </section>

    <section class="panel chartWrap">
      <svg id="chart" viewBox="0 0 1200 720" role="img" aria-label="F3K chart"></svg>
      <div id="tooltip" class="tooltip hidden"></div>
    </section>

    <section class="panel listPanel">
      <div class="listHeader">
        <b>Flights</b>
        <button id="clearData">Clear local data</button>
      </div>
      <div id="flightList" class="flightList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
