<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0b1220" />
  <title>F3K Logbook</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="brand">
        <img class="mark" src="icon.svg" alt="" />
        <div>
          <h1>F3K Logbook</h1>
          <p>by SRK.FPV</p>
        </div>
      </div>
      <button id="themeBtn" class="theme" aria-label="theme">☾</button>
    </header>

    <section class="summary" id="summaryCards">
      <button class="metric" data-focus="all"><span>Flights</span><b id="mFlights">0</b></button>
      <button class="metric" data-focus="time"><span>Total</span><b id="mTime">00:00:00</b></button>
      <button class="metric" data-focus="maxAlt"><span>Max alt</span><b id="mMaxAlt">0 m</b></button>
      <button class="metric" data-focus="launch"><span>Launch</span><b id="mLaunch">0 m</b></button>
      <button class="metric" data-focus="gain"><span>Gain</span><b id="mGain">0 m</b></button>
      <button class="metric" data-focus="longest"><span>Longest</span><b id="mLongest">00:00</b></button>
    </section>

    <section class="calendarPanel">
      <div class="calendarHead">
        <button id="allTimeBtn" class="mini active">All time</button>
        <div id="monthLabel" class="monthLabel">May</div>
      </div>
      <div class="weekdays"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div>
      <div id="calendar" class="calendar"></div>
    </section>

    <section class="viewSwitch">
      <button id="chartsTab" class="tab active">Charts</button>
      <button id="tableTab" class="tab">Log table</button>
      <button id="fitBtn" class="fit">Fit</button>
    </section>

    <section id="chartPanel" class="chartPanel">
      <div class="chartStatus">
        <button id="backBtn" class="back hidden">← Overlay</button>
        <span id="chartLabel">All flights overlay</span>
      </div>
      <div class="chartFrame">
        <svg id="chart" viewBox="0 0 390 380" preserveAspectRatio="none" role="img" aria-label="flight chart"></svg>
        <div id="tooltip" class="tooltip hidden"></div>
      </div>
      <div class="chartHelp">Pinch to zoom time · drag left/right · tap line for details</div>
    </section>

    <section id="tablePanel" class="tablePanel hidden">
      <table>
        <thead><tr><th>Date</th><th>Time</th><th>Lnh</th><th>Max</th><th>Gain</th><th>Dur</th></tr></thead>
        <tbody id="logRows"></tbody>
      </table>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
